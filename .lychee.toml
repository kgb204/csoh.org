# .lychee.toml - Configuration for lychee link checker
# Used by both CI and local runs: lychee ./*.html

# Exclude patterns that block automated checks
exclude = [
  "linkedin\\.com",                # LinkedIn blocks bots with 999 status
  "web\\.archive\\.org/web/\\d+",  # Archive.org rate-limits aggressively
  "sendfox\\.com",                 # Newsletter signup, auth-walled
  "localhost",
  "127\\.0\\.0\\.1",
  "community\\.sap\\.com",        # SAP community blocks bots (403)
  "medium\\.com",                  # Medium blocks bots (403)
  "nexos\\.ai",                    # Blocks bots (403)
  "openai\\.com",                  # Blocks bots (403)
  "securitytrails\\.com",          # Blocks bots (403)
  "training\\.cloudsecurityalliance\\.org",  # Blocks bots (403)
  "fiverr\\.com",                  # Blocks bots (403)
  "glassdoor\\.com",               # Blocks bots (403)
  "indeed\\.com",                  # Blocks bots (403)
  "mdpi\\.com",                    # Blocks bots (403)
  "rsaconference\\.com",           # Blocks bots (403)
  "shodan\\.io",                   # Blocks bots (403)
  "upwork\\.com",                  # Blocks bots (403)
  "uber\\.com",                    # Blocks bots (406)
  "zoomeye\\.org",                 # Blocks bots (521)
  "gitconnected\\.com",            # SSL certificate issues
]

# Accept common redirect status codes
accept = [200, 204, 301, 302, 308]

# Reasonable timeouts for external sites
timeout = 30
max_retries = 3
max_concurrency = 10

# Mail addresses are excluded by default in lychee v0.21+.
# To opt in, set include_mail = true.
