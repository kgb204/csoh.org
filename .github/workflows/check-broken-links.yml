name: Check Broken Links

on:
  pull_request:
    paths:
      - '**.html'
  schedule:
    # Weekly on Mondays at 06:00 UTC to catch external link rot
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  check-links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Check for broken links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411  # v2.8.0
        with:
          args: >-
            --config .lychee.toml
            --verbose
            --no-progress
            --max-concurrency 5
            --glob-ignore-case
            './*.html'
          output: ./lychee-report.md
          format: markdown
          fail: false

      - name: Upload link check report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: broken-links-report
          path: ./lychee-report.md
          retention-days: 30
          if-no-files-found: warn

      - name: Check for broken links in report
        id: report
        if: github.event_name == 'pull_request'
        run: |
          if [ -f ./lychee-report.md ] && grep -qE '\[Errors\]' ./lychee-report.md; then
            echo "has_errors=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_errors=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on PR with broken links
        if: steps.report.outputs.has_errors == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8.0.0
        with:
          script: |
            const fs = require('fs');
            let report = '';
            try {
              report = fs.readFileSync('./lychee-report.md', 'utf8');
            } catch (e) {
              report = 'Error reading link check report';
            }

            if (report.length > 60000) {
              report = report.substring(0, 60000) + '\n\n...(truncated, see artifacts for full report)';
            }

            let comment = `## :warning: Broken Links Detected\n\n`;
            comment += report;
            comment += `\n\n---\nFull report available in workflow artifacts.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
