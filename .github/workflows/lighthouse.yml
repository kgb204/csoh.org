name: Lighthouse CI

on:
  pull_request:
    paths:
      - '**.html'
      - '**.css'
      - '**.js'
  push:
    branches:
      - main
    paths:
      - '**.html'
      - '**.css'
      - '**.js'
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Start local web server
        run: |
          python3 -m http.server 8080 &
          for i in $(seq 1 10); do
            curl -s http://localhost:8080/ > /dev/null && break
            sleep 1
          done

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@fcd65974f7c4c2bf0ee9d09b84d2489183c29726  # v12
        with:
          urls: |
            http://localhost:8080/index.html
            http://localhost:8080/resources.html
            http://localhost:8080/news.html
          runs: 3
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./.lighthouserc.json
